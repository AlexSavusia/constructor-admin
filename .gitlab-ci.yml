stages: [build, deploy]

variables:
  IMAGE: "$CI_REGISTRY_IMAGE/constructor-admin"
  TAG: "$CI_COMMIT_SHA"
  CONTAINER_NAME: "constructor-admin"
  APP_PORT: 10004
build:
  stage: build
  tags: [dev-dg-prod-shell]
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  variables:
    ENV_FILE: ${DOTENV_DEV}
    DOCKER_BUILDKIT: "1"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

    - |
      echo sourcing "$ENV_FILE"
      source "$ENV_FILE"
      echo "$VITE_KEYCLOAK_URL"
      docker build -t "$IMAGE:$TAG"  \
      --build-arg VITE_KEYCLOAK_URL="$VITE_KEYCLOAK_URL" \
      --build-arg VITE_KEYCLOAK_REALM="$VITE_KEYCLOAK_REALM" \
      --build-arg VITE_KEYCLOAK_CLIENT_ID="$VITE_KEYCLOAK_CLIENT_ID" .

    - docker push "$IMAGE:$TAG"

    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$IMAGE:$TAG" "$IMAGE:latest"
        docker push "$IMAGE:latest"
      fi

deploy:
  stage: deploy
  tags: [dev-dg-prod-shell]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_COMMIT_TAG'
      when: on_success
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

    - docker rm -f $CONTAINER_NAME
    - docker run --name $CONTAINER_NAME -d --restart=always -p127.0.0.1:${APP_PORT}:80 "$IMAGE:$TAG"
    - docker image prune -f
